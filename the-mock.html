<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MTH 131 Mock</title>

    <style>
      * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
      }
      html {
        font-family: monospace;
        height: 100vh;
      }
      h1 {
        text-align: center;
        margin-bottom: 1rem;
        text-transform: uppercase;
      }
      p,
      a {
        font-size: 1rem;
        margin-bottom: 0.5rem;
      }
      a {
        text-decoration: none;
        color: white;
      }
      body {
        align-items: center;
        background-color: rgb(219, 248, 255);
        padding: 0.3rem 0.5rem;
      }
      button {
        padding: 0.5rem 1rem;
        border: none;
        border-radius: 10px;
        background-color: green;
        transition: 0.25s;
        color: white;
      }
      button:hover {
        opacity: 0.8;
      }
      button:disabled {
        background-color: gray;
        cursor: not-allowed;
        opacity: 0.6;
      }
      .mock-container {
        display: grid;
        gap: 1rem;
        grid-template-columns: 1fr 1fr;
      }
      .m__item {
        height: 200px;
        padding: 0.5rem;
        border-radius: 0.5rem;
      }
      .m__item:first-of-type {
        background-color: #caffd8;
      }
      .m__item:nth-of-type(2) {
        background-color: rgb(255, 255, 255);
      }
      .fn {
        grid-column: 1/3;
        width: 100%;
        display: flex;
        justify-content: space-between;
      }

      @media screen and (max-width: 400px) {
        .mock-container {
          display: flex;
          flex-direction: column;
        }
        .m__item.m__item:nth-of-type(2) {
          background-color: unset;
        }
      }
    </style>
  </head>
  <body>
    <div class="userinfo"></div>
    <section class="mock-container">
      <div class="m__item js-question-cont">question here</div>
      <div class="m__item">
        <p>Select an option:</p>
        <div class="js-options-cont"></div>
      </div>
      <div class="fn">
        <button class="js-prev">prev</button>
        <button class="js-next">next</button>
        <button class="js-submit">submit</button>
      </div>
    </section>

    <script>
      const questions = ["3 + 3 = ?", "what is the coefficient of 3x"];
      const options = [
        {
          questionNumber: 1,
          correctOption: "d",
          options: {
            a: 5,
            b: 10,
            c: 2,
            d: 6,
          },
        },
        {
          questionNumber: 2,
          correctOption: "a",
          options: {
            a: 3,
            b: 2,
            c: "3x",
            d: 5,
          },
        },
      ];
      let currentQuestion = -1;

      const questionCont = document.querySelector(".js-question-cont");
      const optionsCont = document.querySelector(".js-options-cont");
      const nextBtn = document.querySelector(".js-next");
      const prevBtn = document.querySelector(".js-prev");
      const submitBtn = document.querySelector(".js-submit");
      const mockContainer = document.querySelector(".mock-container");

      let answers = JSON.parse(localStorage.getItem("answers")) || {};

      showNextQuestion();
      showUserInfo();

      nextBtn.addEventListener("click", showNextQuestion);
      prevBtn.addEventListener("click", showPrevQuestion);
      submitBtn.addEventListener("click", handleSubmit);

      function showUserInfo() {
        const userinfo = document.querySelector(".userinfo");

        const name = localStorage.getItem("name");
        const department = localStorage.getItem("department");
        console.log(name, department);

        if (name && department) {
          userinfo.innerHTML = `<h3>Welcome ${name.toUpperCase()}!</h3><p>Department: ${department}</p> <br /> <hr style="border: 1px solid #ddd; margin-bottom: 1rem"/>`;
        }
      }

      /**
       * Calculates the score by comparing user answers with correct answers,
       * and displays the final result on the page.
       */
      function handleSubmit() {
        let score = 0;
        const totalQuestions = questions.length;

        // Compare stored answers with correct options
        options.forEach((optionData, index) => {
          if (answers[index] === optionData.correctOption) {
            score++;
          }
        });

        localStorage.removeItem("answers");

        // set the result in localStorage to be accessed in the result page
        localStorage.setItem(
          "result",
          JSON.stringify({ score, totalQuestions }),
        );
        window.location.href = "result.html";
      }
      function showNextQuestion() {
        if (currentQuestion < questions.length - 1) {
          currentQuestion += 1;
        }
        questionCont.innerHTML = `<p>${questions[currentQuestion]}</p>`;
        displayMatchingOption(currentQuestion);

        updateButtonState();
        window.scrollTo(0, 0);
      }
      function showPrevQuestion() {
        if (currentQuestion > 0) {
          currentQuestion -= 1;
        }
        questionCont.innerHTML = `<p>${questions[currentQuestion]}</p>`;
        displayMatchingOption(currentQuestion);

        updateButtonState();
        window.scrollTo(0, 0);
      }
      function updateButtonState() {
        prevBtn.disabled = currentQuestion === 0;

        nextBtn.disabled = currentQuestion === questions.length - 1;
      }
      function displayMatchingOption(index) {
        const opts = options[index].options;
        const selected = answers[index];

        const html = `
            <p >
                <input type="radio" name="option-radio" value="a"
                ${selected === "a" ? "checked" : ""}/>
                ${opts.a}
            </p>

            <p>
                <input type="radio" name="option-radio" value="b"
                ${selected === "b" ? "checked" : ""}/>
                ${opts.b}
            </p>

            <p>
                <input type="radio" name="option-radio" value="c"
                ${selected === "c" ? "checked" : ""}/>
                ${opts.c}
            </p>

            <p>
                <input type="radio" name="option-radio" value="d"
                ${selected === "d" ? "checked" : ""}/>
                ${opts.d}
            </p>
            `;

        optionsCont.innerHTML = html;

        attachOptionEvents(index);
      }

      function attachOptionEvents(index) {
        const radios = document.querySelectorAll('input[name="option-radio"]');

        radios.forEach((radio) => {
          radio.addEventListener("change", (e) => {
            answers[index] = e.target.value;

            localStorage.setItem("answers", JSON.stringify(answers));
          });
        });
      }
    </script>
  </body>
</html>
