<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>STA 141 Mock</title>

    <style>
      * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
      }
      html {
        font-family: monospace;
        height: 100vh;
      }
      h1 {
        text-align: center;
        margin-bottom: 1rem;
        text-transform: uppercase;
      }
      p,
      a {
        font-size: 1rem;
        margin-bottom: 0.5rem;
      }
      a {
        text-decoration: none;
        color: white;
      }
      body {
        align-items: center;
        background-color: rgb(219, 248, 255);
        padding: 0.3rem 0.5rem;
      }
      button {
        padding: 0.5rem 1rem;
        border: none;
        border-radius: 10px;
        background-color: green;
        transition: 0.25s;
        color: white;
      }
      button:hover {
        opacity: 0.8;
      }
      button:disabled {
        background-color: gray;
        cursor: not-allowed;
        opacity: 0.6;
      }
      .mock-container {
        display: grid;
        gap: 1rem;
        grid-template-columns: 1fr 1fr;
      }
      .m__item {
        height: 200px;
        padding: 0.5rem;
        border-radius: 0.5rem;
      }
      .m__item:first-of-type {
        background-color: #caffd8;
      }
      .m__item:nth-of-type(2) {
        background-color: rgb(255, 255, 255);
      }
      .fn {
        grid-column: 1/3;
        width: 100%;
        display: flex;
        justify-content: space-between;
      }

      @media screen and (max-width: 400px) {
        .mock-container {
          display: flex;
          flex-direction: column;
        }
        .m__item.m__item:nth-of-type(2) {
          background-color: unset;
        }
      }
    </style>
  </head>
  <body>
    <div class="userinfo"></div>
    <section class="mock-container">
      <div class="m__item js-question-cont">question here</div>
      <div class="m__item">
        <p>Select an option:</p>
        <div class="js-options-cont"></div>
      </div>
      <div class="fn">
        <button class="js-prev">prev</button>
        <button class="js-next">next</button>
        <button class="js-submit">submit</button>
      </div>
    </section>

    <script>
      const rawQuestions = [
        "1. If f(x)=kx for 0≤x≤2 is a PDF, find k.",
        "2. If P(X=x)=kx for x=1,2,3 and total probability is 1, find k.",
        "3. A fair die is thrown. What is P(X≥4)?",
        "4. In how many ways can 4 students be selected from 10?",
        "5. Evaluate 5 permutation 3",
        "6. Evaluate 6 combination 2.",
        "7. If P(A)=0.6, P(B)=0.5 and P(A∩B)=0.3 find P(A|B).",
        "8. If mean of data {2,4,6,8} is required, what is it?",
        "9. Which chart best represents grouped data distribution?",
        "10. If a PDF integrates to 1 over its range, what does it represent?",
        "11. Find P(X=2) if PMF is P(X=x)=x/10 for x=1,2,3,4.",
        "12. If a coin is tossed twice, probability of exactly one head?",
        "13. How many permutations of the letters in 'DATA'?",
        "14. Evaluate 7 combination 3.",
        "15. If P(A)=0.4, P(B)=0.5 and A,B independent, find P(A∩B).",
        "16. What is the median of {3,7,9,11,13}?",
        "17. If class width is 5 and lower limit is 10, what is next class?",
        "18. A PDF f(x)=k for 0≤x≤4. Find k.",
        "19. If PMF P(X=x)=k for x=1,2,3,4 find k.",
        "20. How many ways can 3 books be arranged from 6?",
        "21. Evaluate 8 permutation 2.",
        "22. Evaluate 8 combination 4.",
        "23. If P(A|B)=0.5 and P(B)=0.4 and P(A∩B)=0.2 find P(A).",
        "24. Which measure is affected most by extreme values?",
        "25. If mean of grouped data is computed using midpoints, what method is this?",
        "26. If f(x)=2x for 0≤x≤1, find P(X≤0.5).",
        "27. If P(X=0)=0.2, P(X=1)=0.3, P(X=2)=0.5 what is E(X)?",
        "28. Probability of selecting a red ball from 3 red and 2 blue balls?",
        "29. If two events are mutually exclusive, what is P(A∩B)?",
        "30. Which distribution models number of successes in fixed trials?",
      ];

      const questions = shuffleArray(rawQuestions);

      const options = [
        {

        },
        {
          questionNumber: 30,
          correctOption: "d",
          options: { a: "Normal", b: "Poisson", c: "Uniform", d: "Binomial" },
        },
      ];
      let currentQuestion = -1;

      const questionCont = document.querySelector(".js-question-cont");
      const optionsCont = document.querySelector(".js-options-cont");
      const nextBtn = document.querySelector(".js-next");
      const prevBtn = document.querySelector(".js-prev");
      const submitBtn = document.querySelector(".js-submit");
      const mockContainer = document.querySelector(".mock-container");

      let answers = JSON.parse(localStorage.getItem("answers")) || {};

      checkAuth();

      function checkAuth() {
        const authData = JSON.parse(localStorage.getItem("auth"));

        if (authData && authData.hasTakenExam) {
          document.body.innerHTML = `<h2 style="text-align: center; color: #ff8888">You have already taken the exam. Please contact DANNYPY for more information.</h2> <p style="text-align: center; font-size: 0.9rem;">POV: You can hack into it though... LSTG USED!</p>`;
          document.body.style.backgroundColor = "rgb(255, 238, 238)";
          document.body.style = `
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            gap: 1rem;
            padding: 1rem;
            flex-direction: column;
          `;
        } else {
          localStorage.setItem("auth", JSON.stringify({ hasTakenExam: false }));
        }
      }

      showNextQuestion();
      showUserInfo();

      nextBtn.addEventListener("click", showNextQuestion);
      prevBtn.addEventListener("click", showPrevQuestion);
      submitBtn.addEventListener("click", handleSubmit);

      function showUserInfo() {
        const userinfo = document.querySelector(".userinfo");

        const name = localStorage.getItem("name");
        const department = localStorage.getItem("department");
        console.log(name, department);

        if (name && department) {
          userinfo.innerHTML = `<h3>Welcome ${name.toUpperCase()}!</h3><p>Department: ${department}</p> <br /> <hr style="border: 1px solid #ddd; margin-bottom: 1rem"/>`;
        }
      }

      /**
       * Calculates the score by comparing user answers with correct answers,
       * and displays the final result on the page.
       */
      function handleSubmit() {
        let score = 0;
        const totalQuestions = questions.length;

        // Compare stored answers with correct options
        options.forEach((optionData, index) => {
          if (answers[index] === optionData.correctOption) {
            score++;
          }
        });

        localStorage.removeItem("answers");

        // set the result in localStorage to be accessed in the result page
        localStorage.setItem(
          "result",
          JSON.stringify({ score, totalQuestions }),
        );
        localStorage.setItem("auth", JSON.stringify({ hasTakenExam: true }));

        window.location.href = "result.html";
      }
      function showNextQuestion() {
        if (currentQuestion < questions.length - 1) {
          currentQuestion += 1;
        }
        questionCont.innerHTML = `<p style="font-size: 2rem">${questions[currentQuestion]}</p>`;
        displayMatchingOption(currentQuestion);

        updateButtonState();
        window.scrollTo(0, 0);
      }
      function showPrevQuestion() {
        if (currentQuestion > 0) {
          currentQuestion -= 1;
        }
        questionCont.innerHTML = `<p>${questions[currentQuestion]}</p>`;
        displayMatchingOption(currentQuestion);

        updateButtonState();
        window.scrollTo(0, 0);
      }
      function updateButtonState() {
        prevBtn.disabled = currentQuestion === 0;

        nextBtn.disabled = currentQuestion === questions.length - 1;
      }
      function displayMatchingOption(index) {
        const opts = options[index].options;
        const selected = answers[index];

        const html = `
            <p >
                <input type="radio" name="option-radio" value="a"
                ${selected === "a" ? "checked" : ""}/>
                ${opts.a}
            </p>

            <p>
                <input type="radio" name="option-radio" value="b"
                ${selected === "b" ? "checked" : ""}/>
                ${opts.b}
            </p>

            <p>
                <input type="radio" name="option-radio" value="c"
                ${selected === "c" ? "checked" : ""}/>
                ${opts.c}
            </p>

            <p>
                <input type="radio" name="option-radio" value="d"
                ${selected === "d" ? "checked" : ""}/>
                ${opts.d}
            </p>
            `;

        optionsCont.innerHTML = html;

        attachOptionEvents(index);
      }

      function attachOptionEvents(index) {
        const radios = document.querySelectorAll('input[name="option-radio"]');

        radios.forEach((radio) => {
          radio.addEventListener("change", (e) => {
            answers[index] = e.target.value;

            localStorage.setItem("answers", JSON.stringify(answers));
          });
        });
      }

      function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
          // Pick a random index from 0 to i
          const j = Math.floor(Math.random() * (i + 1));

          // Swap elements at i and j
          [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
      }
    </script>
  </body>
</html>
